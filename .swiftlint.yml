included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - Packages
  - DerivedData
  - build

reporter: github-actions-logging

disabled_rules:
  # Let swift-format own pure formatting.
  - trailing_newline
  - trailing_comma
  - opening_brace
  - trailing_whitespace
  - line_length
  - sorted_imports

  # Too noisy for SwiftUI / app code right now.
  - file_length
  - type_body_length
  - function_body_length
  - identifier_name
  - large_tuple

opt_in_rules:
  # Real safety wins.
  - force_unwrapping
  - implicitly_unwrapped_optional
  - empty_count
  - empty_string
  - first_where
  - last_where
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - sorted_first_last
  - reduce_boolean
  - reduce_into
  - redundant_nil_coalescing
  - toggle_bool

  # Better maintainability.
  - closure_body_length
  - collection_alignment
  - convenience_type
  - fatal_error_message
  - lower_acl_than_parent
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

cyclomatic_complexity:
  warning: 12
  error: 20

# SwiftUI bodies and async pipelines exceed typical style limits. With
# `swiftlint --strict`, warnings fail CI, so keep thresholds above current max.
closure_body_length:
  warning: 220
  error: 320

function_parameter_count:
  warning: 7
  error: 10

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 4

todo:
  severity: warning
