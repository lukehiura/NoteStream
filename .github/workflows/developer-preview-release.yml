name: Developer Preview Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

concurrency:
  group: developer-preview-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preview-release:
    name: Build developer preview zip
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-release-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-release-

      - name: Install tools
        run: |
          brew install swift-format swiftlint markdownlint-cli

      - name: Check version tag
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$ ]]; then
            echo "Invalid version tag: $GITHUB_REF_NAME"
            echo "Use tags like v0.1.0 or v0.1.0-beta.1"
            exit 1
          fi

      - name: Run full checks
        run: make check

      - name: Build developer preview zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          scripts/build-preview-app-zip.sh "$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="build/NoteStream-${VERSION}-developer-preview.zip"

          gh release create "$GITHUB_REF_NAME" "$ZIP" \
            --title "NoteStream ${VERSION} Developer Preview" \
            --generate-notes \
            --prerelease \
            --verify-tag
