name: Developer Preview Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

concurrency:
  group: developer-preview-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preview-release:
    name: Build developer preview zip
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-release-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-release-

      - name: Install tools
        run: |
          brew install swift-format swiftlint markdownlint-cli shellcheck actionlint

      - name: Check version tag
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$ ]]; then
            echo "Invalid version tag: $GITHUB_REF_NAME"
            echo "Use tags like v0.1.0 or v0.1.0-beta.1"
            exit 1
          fi

      - name: Run full checks
        run: make check

      - name: Build developer preview zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          scripts/build-preview-app-zip.sh "$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="build/NoteStream-${VERSION}-developer-preview.zip"
          NOTES="build/preview-release-notes.md"

          printf '%s\n' \
            "## NoteStream ${VERSION} developer preview" \
            "" \
            "This build is **ad-hoc signed** only. It is **not** Developer ID signed and **not** notarized. macOS may require you to approve the app under **System Settings → Privacy & Security** (Open Anyway)." \
            "" \
            "- **ZIP:** unzip, then open NoteStream.app (README-DEVELOPER-PREVIEW.txt is inside the zip)." \
            "" \
            "You can still build a local DMG with \`make preview-dmg-version VERSION=${VERSION}\` (not published on GitHub Releases)." \
            "" \
            "For distribution outside the Mac App Store without Gatekeeper friction, Apple documents [Developer ID](https://developer.apple.com/support/developer-id/) and [notarization](https://developer.apple.com/documentation/security/notarizing-macos-software-before-distribution). See docs/release-checklist.md for release expectations." \
            > "$NOTES"

          gh release create "$GITHUB_REF_NAME" "$ZIP" \
            --title "NoteStream ${VERSION} Developer Preview" \
            --notes-file "$NOTES" \
            --prerelease \
            --verify-tag
