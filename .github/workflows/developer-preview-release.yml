name: Developer Preview Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

concurrency:
  group: developer-preview-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preview-release:
    name: Build developer preview zip
    runs-on: macos-15
    env:
      NOTESTREAM_SCRIPT_LOCK_WAIT_SEC: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-release-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-release-

      - name: Install tools
        run: |
          brew install swift-format swiftlint markdownlint-cli shellcheck actionlint

      - name: Check version tag
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$ ]]; then
            echo "Invalid version tag: $GITHUB_REF_NAME"
            echo "Use tags like v0.1.0 or v0.1.0-beta.1"
            exit 1
          fi

      - name: Release verify (clean, release build, coverage)
        timeout-minutes: 25
        run: scripts/check.sh release

      - name: Build developer preview zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          scripts/packaging/build-preview-app-zip.sh "$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="build/NoteStream-${VERSION}-developer-preview.zip"
          NOTES="build/preview-release-notes.md"

          printf '%s\n' \
            "## NoteStream ${VERSION} developer preview" \
            "" \
            "Developer preview: **ad-hoc signed** only; **not** Developer ID; **not** notarized. See **[docs/release.md](https://github.com/lukehiura/NoteStream/blob/main/docs/release.md)** for trust model, checklist, and Apple signing doc links." \
            "" \
            "- **ZIP** (this asset): includes a short \`README-DEVELOPER-PREVIEW.txt\` pointing to that doc." \
            "- **DMG:** \`make preview-dmg-version VERSION=${VERSION}\` locally (not published here)." \
            > "$NOTES"

          gh release create "$GITHUB_REF_NAME" "$ZIP" \
            --title "NoteStream ${VERSION} Developer Preview" \
            --notes-file "$NOTES" \
            --prerelease \
            --verify-tag
