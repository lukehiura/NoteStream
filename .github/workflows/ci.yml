name: CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swift-checks:
    name: Swift checks
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install tools
        run: |
          brew install swift-format swiftlint markdownlint-cli shellcheck actionlint

      - name: Fast check
        timeout-minutes: 3
        run: scripts/fast-check.sh

      - name: Resolve packages
        timeout-minutes: 5
        run: swift package resolve

      - name: Build debug
        timeout-minutes: 8
        run: swift build

      - name: Run fast tests
        timeout-minutes: 5
        run: make test-fast

      - name: Python tools check
        timeout-minutes: 1
        run: make python-tools-check

      - name: Upload debug build artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: notestream-debug-build
          path: .build/**/NoteStreamApp
          retention-days: 14

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-debug
          path: |
            .build/**/*.log
            .build/**/*.json
