name: CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swift-checks:
    name: Swift checks
    runs-on: macos-15
    timeout-minutes: 15
    env:
      # Local default is 30s; on CI, fail the script lock quickly if a prior step did not release.
      NOTESTREAM_SCRIPT_LOCK_WAIT_SEC: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install tools
        run: |
          brew install swift-format swiftlint markdownlint-cli shellcheck actionlint

      # Single ladder: same as `make check` + `make python-tools-check` (lint, resolve, debug build, fast tests, Python).
      - name: PR check
        timeout-minutes: 12
        run: scripts/check.sh dev

      - name: Upload debug build artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: notestream-debug-build
          path: .build/**/NoteStreamApp
          retention-days: 14

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-debug
          path: |
            .build/**/*.log
            .build/**/*.json
