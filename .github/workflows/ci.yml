name: CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swift-checks:
    name: Swift checks
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # restore-keys can restore a pre-migration .build that still contains a Swift Testing
      # PackageTests.derived runner; strip it so `swift test --disable-swift-testing` does not
      # compile against a stale runner that imports _TestingInternals.
      - name: Clear stale SwiftPM test runner artifacts
        run: |
          [ -d .build ] || exit 0
          find .build -type d -name '*.derived' | while IFS= read -r d; do rm -rf "$d"; done

      - name: Install tools
        run: |
          brew install swift-format swiftlint markdownlint-cli shellcheck actionlint

      - name: Fast check
        run: scripts/fast-check.sh

      - name: Resolve
        run: swift package resolve

      - name: Build debug
        run: swift build -v

      - name: Build release
        run: swift build -c release -v

      # With swift-testing in Package.swift: plain swift test. After an XCTest-only
      # migration (no swift-testing dependency), use --disable-swift-testing (as below).
      - name: Test with coverage
        run: swift test --enable-code-coverage --disable-swift-testing -v

      - name: Python tools check
        run: make python-tools-check

      - name: Upload debug build artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: notestream-debug-build
          path: .build/**/NoteStreamApp
          retention-days: 14

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-debug
          path: |
            .build/**/*.log
            .build/**/*.json
